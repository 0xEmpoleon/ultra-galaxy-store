<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toshinori Ishibashi × Refined Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:slnt,wght@-10..0,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/jiw5nsk.css">

    <!-- JOY Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Hidden Youtube Player for Autoplay -->
    <div style="position: absolute; width: 0; height: 0; pointer-events: none; opacity: 0;">
        <iframe width="0" height="0"
            src="https://www.youtube.com/embed/cORCsXQSv5g?autoplay=1&loop=1&playlist=cORCsXQSv5g" frameborder="0"
            allow="autoplay"></iframe>
    </div>

    <!-- Landing Page (Neo-Classical / Dark Mode) -->
    <section class="hero-section">
        <div id="landing-hero" class="neo-hero">
            <!-- Theme Toggle -->
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <span class="toggle-icon"></span>
            </button>
            <!-- 3D Canvas Container -->
            <div id="canvas-container"></div>

            <div class="neo-panels">
                <!-- Center Panel: Major Identity -->
                <div class="panel panel-main">
                    <div class="mega-headings">
                        <h1>Toshinori Ishibashi</h1>
                        <div class="sub-headings">
                            <h2>Not a Curator</h2>
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Info & Links -->
                <div class="panel panel-info">
                    <div class="info-blocks-group">
                        <div class="info-block">
                            <div class="label">Status & Position</div>
                            <div class="content"><a href="https://www.laserdigital.com/" target="_blank">Laser Digital
                                    Asset
                                    Management</a></div>
                            <div class="content secondary-content"><a href="https://playonjoy.com/pre-book"
                                    target="_blank">Play on Joy</a></div>
                        </div>

                        <div class="info-block">
                            <div class="label">Location</div>
                            <div class="content">London, Dubai</div>
                        </div>
                    </div>

                    <nav class="neo-nav">
                        <ul>
                            <li><a href="https://0xempoleon.notion.site/0xEmpoleon-a705323cd04540c6a74917ffcdbb69a0"
                                    target="_blank">Knowledge</a></li>
                            <li><a href="https://github.com/0xEmpoleon" target="_blank">GitHub</a></li>
                            <li><a href="https://www.youtube.com/watch?v=cORCsXQSv5g&list=PLh2CwYobtzXw3snHZWZYQrTSduF56R4zx&index=2"
                                    target="_blank">Playlist</a></li>
                            <li><a href="#store" class="scroll-trigger">Design System ↓</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>

        <div class="spline-bg">
            <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.91/build/spline-viewer.js"></script>
            <spline-viewer url="https://prod.spline.design/iK7lP-x0x-wXgQ7O/scene.splinecode"></spline-viewer>
        </div>
    </section>

    <!-- Store Section (High-Fidelity One-to-One Reproduction) -->
    <section class="gallery-section" id="store">
        <div class="store-header-container">
            <div class="store-category-label">Favourites</div>
            <h2 class="store-title">The Selection</h2>
        </div>

        <div class="store-grid">
            <!-- System 1: Cipher Digital -->
            <div class="product-card reveal" data-system="cipher">
                <div class="product-media"
                    style="background: radial-gradient(circle, rgba(15,135,255,0.2) 0%, #000000 80%); border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center;">
                    <div
                        style="font-family: 'articulat-cf', sans-serif; font-size: 32px; color: #ffffff; letter-spacing: 2px; font-weight: 600;">
                        CIPHER</div>
                    <div class="bookmark-trigger">
                        <div class="bookmark-icon"></div>
                    </div>
                    <div class="card-overlay">
                        <a href="src/integrations/design-system/index.html" class="overlay-btn view-btn">View System</a>
                        <button class="overlay-btn apply-btn" data-apply="cipher">Apply System</button>
                    </div>
                </div>
            </div>

            <!-- System 2: JOY Tech -->
            <div class="product-card reveal" data-system="joy">
                <div class="product-media"
                    style="background: radial-gradient(circle, rgba(57,255,20,0.15) 0%, #111111 80%); border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center;">
                    <div
                        style="font-family: 'Press Start 2P', cursive; font-size: 32px; color: #39FF14; text-shadow: 4px 4px 0px rgba(255,255,255,0.1); text-align: center;">
                        JOY</div>
                    <div class="bookmark-trigger">
                        <div class="bookmark-icon"></div>
                    </div>
                    <div class="card-overlay">
                        <a href="src/integrations/joy/index.html" class="overlay-btn view-btn">View System</a>
                        <button class="overlay-btn apply-btn" data-apply="joy">Apply System</button>
                    </div>
                </div>
            </div>

            <!-- System 3: Awaiting -->
            <div class="product-card reveal" style="opacity: 0.5;">
                <div class="product-media"
                    style="background: #111; display: flex; align-items: center; justify-content: center; border: 1px dashed rgba(255,255,255,0.1);">
                    <div
                        style="font-family: 'Inter', sans-serif; font-size: 14px; color: #444; text-transform: uppercase; letter-spacing: 2px;">
                        OFFLINE_NODE</div>
                </div>
            </div>
        </div>
    </section>

    <script src="main.js"></script>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>

</html>

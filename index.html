<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Design System</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:slnt,wght@-10..0,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.typekit.net/jiw5nsk.css">

    <!-- JOY Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-mode">
    <!-- Landing Page -->
    <section class="hero-section">
        <div id="landing-hero" class="neo-hero">
            <!-- Theme Toggle -->
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <span class="toggle-icon"></span>
            </button>
            <!-- 3D Canvas Container -->
            <div id="canvas-container"></div>

            <div class="neo-panels">
                <!-- Center Panel: Major Identity -->
                <div class="panel panel-main">
                    <div class="mega-headings">
                        <h1>Toshinori Ishibashi</h1>
                        <div class="sub-headings">
                            <h2>Not a Curator</h2>
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Info & Links -->
                <div class="panel panel-info">
                    <div class="info-blocks-group">
                        <div class="info-block">
                            <div class="label">Status & Position</div>
                            <div class="content"><a href="https://www.laserdigital.com/" target="_blank">Laser Digital
                                    Asset
                                    Management</a></div>
                            <div class="content secondary-content"><a href="https://playonjoy.com/pre-book"
                                    target="_blank">Play on Joy</a></div>
                        </div>

                        <div class="info-block">
                            <div class="label">Location</div>
                            <div class="content">London, Dubai</div>
                        </div>
                    </div>

                    <nav class="neo-nav">
                        <ul>
                            <li><a href="https://0xempoleon.notion.site/0xEmpoleon-a705323cd04540c6a74917ffcdbb69a0"
                                    target="_blank">Knowledge</a></li>
                            <li><a href="https://github.com/0xEmpoleon" target="_blank">GitHub</a></li>
                            <li><a href="https://www.youtube.com/watch?v=cORCsXQSv5g&list=PLh2CwYobtzXw3snHZWZYQrTSduF56R4zx&index=2"
                                    target="_blank">Playlist</a></li>
                            <li><a href="#store" class="scroll-trigger">Design System ↓</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>

        <div class="spline-bg">
            <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.91/build/spline-viewer.js"></script>
            <spline-viewer url="https://prod.spline.design/iK7lP-x0x-wXgQ7O/scene.splinecode"></spline-viewer>
        </div>
    </section>

    <!-- Store Section (High-Fidelity One-to-One Reproduction) -->
    <section class="gallery-section" id="store">
        <div class="store-header-container">
            <div class="store-category-label">Favourites</div>
            <h2 class="store-title">The Selection</h2>
            <button id="revert-btn"
                style="padding: 10px 20px; background: transparent; border: 1px solid var(--sys-text-primary); color: var(--sys-text-primary); font-family: var(--sys-font-primary); font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: all 0.3s ease; border-radius: 50px; width: 180px; text-align: center; margin-top: 20px; display: none;">Revert
                Design</button>
        </div>

        <div class="store-grid">
            <!-- Web Component Instances (alphabetical) -->
            <system-card system-id="cipher" title="CIPHER" subtitle="Cipher Digital" accent="#0f87ff"
                font="'articulat-cf', sans-serif" scale="clamp(40px, 6vw, 80px)"
                link="src/integrations/design-system/brand-guidelines.html"
                reconstruct-link="src/integrations/design-system/index.html">
            </system-card>

            <system-card system-id="joy" title="JOY" subtitle="Joy Tech" accent="#39FF14"
                font="'Press Start 2P', cursive" scale="clamp(32px, 5vw, 72px)"
                link="src/integrations/joy/brand-guidelines.html" reconstruct-link="src/integrations/joy/index.html">
            </system-card>

            <system-card system-id="telekom-ot" title="TELKOM" subtitle="Telekom OT" accent="#FF4F33"
                font="'Inter', sans-serif" scale="clamp(40px, 6vw, 80px)"
                link="src/integrations/telekom-ot/brand-guidelines.html"
                reconstruct-link="src/integrations/telekom-ot/index.html">
            </system-card>

            <system-card system-id="steakhouse" title="STEAKHOUSE" subtitle="Steakhouse Financial" accent="#00A36C"
                font="'Geist Sans', 'Inter', sans-serif" scale="clamp(32px, 5vw, 64px)"
                link="src/integrations/steakhouse/brand-guidelines.html"
                reconstruct-link="src/integrations/steakhouse/index.html">
            </system-card>
        </div>
    </section>

    <!-- Component Registry -->
    <script src="components.js"></script>

    <script src="main.js"></script>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
